<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .btn {
      background-color: brown;
      display: inline-block;
      padding: 7px;
      border-radius: 3px;
      color: #fff;
      cursor: pointer;
      margin-left: 10px;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
      color: #333;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin-top: 10px;
      background: #f1f1f1;
      padding: 8px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="container">

  <h4 id="dash"></h4>
  <h2>Add Expense</h2>

  <form id="form">
    <input type="number" id="amount" placeholder="Enter Amount" required />
    <input type="text" id="desc" placeholder="Description" required />

    <select id="category" required>
      <option value="">Select Category</option>
      <option value="food">Food</option>
      <option value="petrol">Travel</option>
      <option value="shopping">Shopping</option>
      <option value="salary">Bills</option>
      <option value="other">Other</option>
    </select>

    <button type="submit">Add Expense</button>
  </form>

  <ul id="list"></ul>
 <button onclick="showLeaderboard()">Show Premium</button>
</div>
   <div>
    <h4>Premium user</h4>
    <ul id="premium">
     <li>dcjd</li>
    </ul>
   </div>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
let payload = {};
let token = localStorage.getItem("token");
console.log(token)

document.addEventListener("DOMContentLoaded", () => {

  if (!token) {
    alert("No token found!");
    return;
  }

  payload = JSON.parse(atob(token.split(".")[1]));

  document.getElementById("dash").textContent =
    `${payload.email} - Dashboard`;

  getExpenses();

 let form = document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();

    try {
      const data = {
        amount: Number(document.getElementById("amount").value), 
        description: document.getElementById("desc").value,
        category: document.getElementById("category").value
      };

      await axios.post("http://localhost:3000/expense", data, {
        headers: {
          Authorization: `Bearer ${token}`
        }
      });

      alert("Expense Added!");
      getExpenses();

        document.getElementById("amount").value="" 
        document.getElementById("desc").value=""
        document.getElementById("category").value=""

    } catch (err) {
      console.log(err);
    }
  });
});

async function getExpenses() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  try {
    const res = await axios.get(
      `http://localhost:3000/expense`,
      {
        headers: {
          Authorization: `Bearer ${token}`
        }
      }
    );

    const expenses = res.data.data;

    expenses.forEach((item) => {
      const li = document.createElement("li");

      li.innerText = `${item.amount} - ${item.category}`;

      const btn = document.createElement("span");
      btn.innerText = " Delete";
      btn.classList.add("btn");

      btn.addEventListener("click", async () => {
        try {
          await axios.delete(
            `http://localhost:3000/expense/${item.id}`,
            {
              headers: {
                Authorization: `Bearer ${token}`
              }
            }
          );

          getExpenses();
        } catch (err) {
          console.log(err);
        }
      });

      li.appendChild(btn);
      list.appendChild(li);
    });

  } catch (err) {
    console.log(err);
  }
}
async function showLeaderboard(){
  try{
  let res = await axios.get("http://localhost:3000/premium/show-leaderboard");
  return console.log(res.data)
  }
  catch(err){
   console.log(err)
  }
}
</script>

</body>
</html>
