<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .btn{
      background-color: brown;
       display: inline-block;
      padding: 7px;
      border-radius: 3px;
      color: #fff;
      cursor: pointer;
      margin-top: 5px;
    }
    .container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #4CAF50;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    button:hover {
      background: #45a049;
    }

    .note {
      font-size: 12px;
      text-align: center;
      margin-top: 10px;
      color: #777;
    }
  </style>
</head>

<body>

  <div class="container">
    <h4> Dashboard</h4>
    <h2>Add Expense</h2>

    <form id="form">
      <input type="number" id="amount" placeholder="Enter Amount" required />

      <input type="text" id="desc" placeholder="Description" required />

      <select required id="category">
        <option value="">Select Category</option>
        <option value="food">Food</option>
        <option value="petrol">Travel</option>
        <option value="shopping">Shopping</option>
        <option value="salary">Bills</option>
        <option value="other">Other</option>
      </select>

      <button type="submit">Add Expense</button>
    </form>

    <div class="note">
     <ul id="list">
     
     </ul>
    </div>
  </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
 <script>
   let form = document.getElementById("form")

   document.addEventListener("DOMContentLoaded",()=>{
       getExpenses();
    form.addEventListener("submit", async(e)=>{
     e.preventDefault();
     try{
      const payoad={
       amount:document.getElementById("amount").value,
       description:document.getElementById("desc").value,
       category:document.getElementById("category").value
      }
     let res = await axios.post("http://localhost:3000/expense",payoad)
     alert('Expense Added!');
     getExpenses();
     }
     catch(err){
      console.log(err)
     }
    })
    let expenses =[]
   async function getExpenses(){
    let list = document.getElementById("list")
     list.innerHTML =""
     try{
      let res = await axios.get("http://localhost:3000/expense");
      expenses = res.data.data;
     expenses.forEach((item) => {
    let li = document.createElement("li");
   
    li.innerText = `${item.amount} - ${item.category} `;

    let btn = document.createElement("span");
    btn.addEventListener("click",async()=>{
     try{
      await axios.delete(`http://localhost:3000/expense/${item.id}`)
      getExpenses();
     }
     catch(err){
      console.log(err)
     }
    })
    btn.classList.add("btn")
    btn.innerText = "Del";
    let hr = document.createElement("hr")
    li.appendChild(btn);
     li.appendChild(hr)
    list.appendChild(li);
    });
     }
     catch(err){
      console.log(err)
     }
    }
   })
 </script>
</body>
</html>
